<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ESP32 控制台</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --blue: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --orange: #ea580c;
    --border: #e5e7eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter','Segoe UI',system-ui,sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ═══════════ Nav bar ═══════════ */
  #nav-bar {
    position: fixed; top: 0; right: 0; z-index: 10001;
    display: flex; gap: 0; padding: 8px 14px;
  }
  #nav-bar a {
    display: block; padding: 7px 16px;
    background: rgba(30,41,59,0.88); color: #cbd5e1;
    text-decoration: none; font-size: 13px;
    font-family: 'Microsoft YaHei','PingFang SC',sans-serif;
    backdrop-filter: blur(6px); transition: all 0.2s;
    border-right: 1px solid rgba(255,255,255,0.1); white-space: nowrap;
  }
  #nav-bar a:first-child { border-radius: 8px 0 0 8px; }
  #nav-bar a:last-child  { border-radius: 0 8px 8px 0; border-right: none; }
  #nav-bar a:hover { background: rgba(37,99,235,0.75); color: #fff; }
  #nav-bar a.active { background: rgba(37,99,235,0.85); color: #fff; font-weight: bold; }

  /* ═══════════ Topbar ═══════════ */
  .topbar {
    width: 100%; height: 48px;
    display: flex; align-items: center;
    padding: 0 20px;
    background: #1e293b; color: #f1f5f9; font-size: 14px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.12);
  }
  .topbar .brand { font-weight: 600; letter-spacing: 0.5px; }
  .topbar .brand span { color: #38bdf8; }
  .topbar .spacer { flex: 1; }
  .status-row { display: flex; align-items: center; gap: 7px; font-size: 13px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .status-dot.off { background: #f87171; }
  .status-dot.on  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

  /* ═══════════ Content ═══════════ */
  .content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 16px; gap: 16px;
    max-width: 500px; width: 100%;
  }

  /* ═══════════ D-Pad card ═══════════ */
  .card {
    background: var(--card); border-radius: 14px;
    box-shadow: var(--shadow); padding: 20px;
    width: 100%; display: flex; flex-direction: column; align-items: center;
  }
  .card h2 { font-size: 15px; font-weight: 600; color: #374151; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

  .dpad {
    display: grid;
    grid-template-columns: 80px 80px 80px;
    grid-template-rows: 80px 80px 80px;
    gap: 8px; justify-content: center;
  }
  .dbtn {
    border: 2px solid var(--border); border-radius: 18px;
    background: #f8fafc; color: var(--text);
    font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; touch-action: manipulation;
    flex-direction: column; gap: 1px;
  }
  .dbtn .arr { font-size: 28px; line-height: 1; pointer-events: none; }
  .dbtn .lbl { font-size: 10px; color: var(--muted); pointer-events: none; }
  .dbtn:active, .dbtn.pressed {
    background: #dbeafe; border-color: var(--blue);
    box-shadow: 0 0 16px rgba(37,99,235,0.25);
    transform: scale(0.94);
  }
  .dbtn-stop {
    background: #fef2f2; border-color: #fecaca;
    font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--red);
  }
  .dbtn-stop:active, .dbtn-stop.pressed {
    background: #fee2e2; border-color: var(--red);
    box-shadow: 0 0 16px rgba(220,38,38,0.25);
  }

  /* ═══════════ ABCD buttons ═══════════ */
  .custom-row { display: flex; gap: 12px; width: 100%; }
  .cbtn {
    flex: 1; padding: 16px 0; border: none; border-radius: 12px;
    font-size: 22px; font-weight: 800; letter-spacing: 1px;
    cursor: pointer; color: #fff;
    transition: all 0.1s; touch-action: manipulation;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .cbtn:active { transform: scale(0.93); }
  .cbtn-a { background: #ef4444; }
  .cbtn-b { background: #8b5cf6; }
  .cbtn-c { background: #10b981; }
  .cbtn-d { background: #f59e0b; }

  /* ═══════════ Log card ═══════════ */
  .log-box {
    width: 100%; max-height: 150px; overflow-y: auto;
    font-family: 'Cascadia Code','SF Mono','Consolas',monospace;
    font-size: 12px; line-height: 1.7;
    background: #f8fafc; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
  }
  .log-box .entry { display: flex; gap: 8px; }
  .log-box .time { color: var(--muted); flex-shrink: 0; font-size: 11px; }
  .log-box .cmd { color: var(--blue); }
  .log-box .err { color: var(--red); }

  /* ═══════════ Hint ═══════════ */
  .hint {
    text-align: center; font-size: 11px; color: var(--muted);
  }
  .hint kbd {
    display: inline-block; padding: 2px 7px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 4px; font-family: inherit; font-size: 11px; margin: 0 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  @media (max-width: 420px) {
    .dpad { grid-template-columns: 64px 64px 64px; grid-template-rows: 64px 64px 64px; }
    .dbtn .arr { font-size: 24px; }
    .content { padding: 12px; }
  }
</style>
</head>
<body>

<!-- ═══════════ Nav bar ═══════════ -->
<nav id="nav-bar">
  <a href="http://8.148.208.229/">🗺️ 地图</a>
  <a href="/">📟 串口</a>
  <a href="http://8.148.208.229/imagic">🖼️ 图片</a>
  <a href="/control" class="active">🎮 控制</a>
</nav>

<!-- ═══════════ Topbar ═══════════ -->
<div class="topbar">
  <div class="brand">🎮 <span>ESP32</span> 控制台</div>
  <div class="spacer"></div>
  <div class="status-row">
    <div class="status-dot off" id="statusDot"></div>
    <span id="statusText">就绪</span>
  </div>
</div>

<div class="content">
  <!-- D-Pad -->
  <div class="card">
    <h2>方向控制</h2>
    <div class="dpad">
      <button class="dbtn" id="btnUp" style="grid-column:2;grid-row:1">
        <span class="arr">▲</span><span class="lbl">前进</span>
      </button>
      <button class="dbtn" id="btnLeft" style="grid-column:1;grid-row:2">
        <span class="arr">◀</span><span class="lbl">左转</span>
      </button>
      <button class="dbtn dbtn-stop" id="btnStop" style="grid-column:2;grid-row:2">STOP</button>
      <button class="dbtn" id="btnRight" style="grid-column:3;grid-row:2">
        <span class="arr">▶</span><span class="lbl">右转</span>
      </button>
      <button class="dbtn" id="btnDown" style="grid-column:2;grid-row:3">
        <span class="arr">▼</span><span class="lbl">后退</span>
      </button>
    </div>
  </div>

  <!-- Custom keys -->
  <div class="card">
    <h2>自定义按键</h2>
    <div class="custom-row">
      <button class="cbtn cbtn-a" id="btnA">A</button>
      <button class="cbtn cbtn-b" id="btnB">B</button>
      <button class="cbtn cbtn-c" id="btnC">C</button>
      <button class="cbtn cbtn-d" id="btnD">D</button>
    </div>
  </div>

  <!-- Hint -->
  <div class="hint">
    键盘: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或 <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
    &nbsp;|&nbsp; 自定义: <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>📋 指令日志</h2>
    <div class="log-box" id="logBox">
      <span style="color:var(--muted)">按下方向键发送指令...</span>
    </div>
  </div>
</div>

<script>
const REPEAT_MS = 200;
let logLines = [];

// ── WebSocket ──
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = `${protocol}//${location.host}/ws/frontend`;
let ws = null;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => { updateStatus(true); addLog('已连接', 'sys'); };
  ws.onclose = () => { updateStatus(false); addLog('断开, 2s 重连…', 'err'); setTimeout(connect, 2000); };
  ws.onerror = () => updateStatus(false);
}

async function pollHealth() {
  try { const r = await fetch('/health'); const j = await r.json(); updateStatus(j.esp32_connected); }
  catch(e) { updateStatus(false); }
}

function updateStatus(online) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + (online ? 'on' : 'off');
  txt.textContent = online ? 'ESP32 在线' : '等待连接…';
}

// ── Send ──
function sendCmd(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send('CMD:' + cmd);
    addLog(cmd, 'ok');
    updateStatus(true);
  } else {
    addLog(cmd + ' (未连接)', 'err');
  }
}

// ── Log ──
function addLog(text, type) {
  const time = new Date().toLocaleTimeString('zh-CN', {hour12: false});
  logLines.unshift({time, text, type});
  if (logLines.length > 50) logLines.pop();
  renderLog();
}
function renderLog() {
  const box = document.getElementById('logBox');
  box.innerHTML = logLines.slice(0, 20).map(l =>
    `<div class="entry"><span class="time">${l.time}</span><span class="${l.type==='err'?'err':'cmd'}">${l.text}</span></div>`
  ).join('') || '<span style="color:var(--muted)">等待操作...</span>';
}

// ── Repeat (long-press) ──
let activeDir = null, repeatTimer = null;
function startRepeat(dir) {
  if (activeDir === dir) return;
  stopRepeat();
  activeDir = dir;
  sendCmd('turn ' + dir);
  repeatTimer = setInterval(() => sendCmd('turn ' + dir), REPEAT_MS);
}
function stopRepeat() {
  if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
  if (activeDir) { sendCmd('turn stop'); activeDir = null; }
}

// ── Bind D-pad ──
function bindPad(id, dir) {
  const btn = document.getElementById(id);
  const down = (e) => { e.preventDefault(); btn.classList.add('pressed'); startRepeat(dir); };
  const up   = (e) => { e.preventDefault(); btn.classList.remove('pressed'); stopRepeat(); };
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup', up);
  btn.addEventListener('mouseleave', up);
  btn.addEventListener('touchstart', down);
  btn.addEventListener('touchend', up);
  btn.addEventListener('touchcancel', up);
}
bindPad('btnUp',    'forward');
bindPad('btnDown',  'backward');
bindPad('btnLeft',  'left');
bindPad('btnRight', 'right');

['click','touchend'].forEach(ev =>
  document.getElementById('btnStop').addEventListener(ev, (e) => { e.preventDefault(); stopRepeat(); })
);

// ── Bind ABCD ──
['A','B','C','D'].forEach(k => {
  const btn = document.getElementById('btn'+k);
  const down = (e) => { e.preventDefault(); btn.style.opacity = '0.7'; };
  const up   = (e) => { e.preventDefault(); btn.style.opacity = '1'; sendCmd(k); };
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup', up);
  btn.addEventListener('mouseleave', up);
  btn.addEventListener('touchstart', down);
  btn.addEventListener('touchend', up);
  btn.addEventListener('touchcancel', up);
});

// ── Keyboard ──
const keyDir = { ArrowUp:'forward', ArrowDown:'backward', ArrowLeft:'left', ArrowRight:'right', w:'forward', s:'backward', a:'left', d:'right', W:'forward', S:'backward', A:'left', D:'right' };
const keyCustom = { '1':'A', '2':'B', '3':'C', '4':'D' };
const btnMap = { forward:'btnUp', backward:'btnDown', left:'btnLeft', right:'btnRight' };
let keyActive = null, keyTimer = null;

document.addEventListener('keydown', (e) => {
  const dir = keyDir[e.key];
  if (dir) {
    e.preventDefault();
    const btn = document.getElementById(btnMap[dir]);
    if (btn) btn.classList.add('pressed');
    if (keyActive === dir) return;
    keyActive = dir;
    if (keyTimer) clearInterval(keyTimer);
    sendCmd('turn ' + dir);
    keyTimer = setInterval(() => sendCmd('turn ' + dir), REPEAT_MS);
    return;
  }
  const c = keyCustom[e.key];
  if (c) {
    e.preventDefault(); sendCmd(c);
    const btn = document.getElementById('btn'+c);
    if (btn) { btn.style.opacity = '0.7'; setTimeout(() => btn.style.opacity = '1', 100); }
  }
});
document.addEventListener('keyup', (e) => {
  const dir = keyDir[e.key];
  if (dir) {
    e.preventDefault();
    const btn = document.getElementById(btnMap[dir]);
    if (btn) btn.classList.remove('pressed');
    if (keyActive === dir) { clearInterval(keyTimer); keyTimer = null; keyActive = null; sendCmd('turn stop'); }
  }
});

// ── Start ──
connect();
setInterval(pollHealth, 5000);
pollHealth();
</script>
</body>
</html>
