<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片显示</title>
    <style>
        :root {
            --bg: #0b1121;
            --card: #111827;
            --border: #1e293b;
            --txt: #e2e8f0;
            --sub: #94a3b8;
            --blue: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: radial-gradient(ellipse at 50% 0%, #1a2332 0%, var(--bg) 70%);
            color: var(--txt);
            font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav bar */
        #nav-bar {
            position: fixed; top: 0; right: 0; z-index: 9999;
            display: flex; gap: 0; padding: 10px 16px;
        }
        #nav-bar a {
            display: block; padding: 8px 18px;
            background: rgba(0,0,0,0.7); color: #ccc;
            text-decoration: none; font-size: 14px;
            backdrop-filter: blur(6px); transition: all 0.2s;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        #nav-bar a:first-child { border-radius: 8px 0 0 8px; }
        #nav-bar a:last-child  { border-radius: 0 8px 8px 0; border-right: none; }
        #nav-bar a:hover { background: rgba(33,150,243,0.7); color: #fff; }
        #nav-bar a.active { background: rgba(33,150,243,0.85); color: #fff; font-weight: bold; }

        header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(17,24,39,0.6);
            backdrop-filter: blur(12px);
        }
        header h1 { font-size: 20px; font-weight: 700; }
        header h1 span { color: var(--blue); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            gap: 20px;
        }

        /* Image container */
        .image-container {
            width: 100%;
            max-width: 960px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 300px;
        }
        .image-container img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
        }
        .image-placeholder {
            color: var(--sub);
            font-size: 16px;
            text-align: center;
            line-height: 1.8;
            padding: 60px;
        }

        /* Upload area */
        .upload-area {
            width: 100%;
            max-width: 960px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--blue);
            background: rgba(56,189,248,0.08);
        }
        .upload-area input[type=file] { display: none; }
        .upload-area label {
            cursor: pointer;
            color: var(--blue);
            font-weight: 600;
            font-size: 16px;
        }
        .upload-area .hint { color: var(--sub); font-size: 13px; margin-top: 6px; }

        .info-bar {
            padding: 10px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--sub);
            border-top: 1px solid var(--border);
        }
        .info-bar span { color: var(--blue); }
        .info-bar .empty { color: #666; }
    </style>
</head>
<body>

    <nav id="nav-bar">
        <a href="/">🗺️ 地图</a>
        <a href="http://8.148.208.229:8010/">📟 串口</a>
        <a href="/imagic" class="active">🖼️ 图片</a>
        <a href="http://8.148.208.229:8010/control">🎮 控制</a>
    </nav>

    <header>
        <h1><span>Image</span> Display</h1>
    </header>

    <main>
        <div class="image-container" id="imageContainer">
            <div class="image-placeholder" id="placeholder">
                No image yet. Upload or wait for ESP32.
            </div>
            <img id="mainImage" src="" alt="Current Image" style="display:none">
        </div>

        <div class="upload-area" id="uploadArea">
            <label for="fileInput">Click to Upload Image</label>
            <input type="file" id="fileInput" accept="image/*">
            <div class="hint">JPG / PNG / GIF / WebP / BMP — new image replaces old</div>
        </div>
    </main>

    <div class="info-bar" id="infoBar">
        <span class="empty">Waiting for image...</span>
    </div>

    <script>
        const img = document.getElementById('mainImage');
        const placeholder = document.getElementById('placeholder');
        const infoBar = document.getElementById('infoBar');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        let lastMtime = null;

        function showImage(src, filename, size, mtime) {
            // Preload then swap — avoids race between onload and src
            placeholder.style.display = 'none';

            const preload = new Image();
            preload.onload = function () {
                img.src = src;
                img.style.display = 'block';
                img.style.opacity = '1';
            };
            preload.onerror = function () {
                infoBar.innerHTML = '<span style="color:#f87171">Image load failed</span>';
                placeholder.style.display = 'block';
                img.style.display = 'none';
            };
            preload.src = src;

            const sizeKB = (size / 1024).toFixed(1);
            const timeStr = new Date(mtime * 1000).toLocaleString();
            infoBar.innerHTML = `${filename} | ${sizeKB} KB | ${timeStr}`;
        }

        function hideImage() {
            img.style.display = 'none';
            placeholder.style.display = 'block';
            infoBar.innerHTML = '<span class="empty">Waiting for image...</span>';
            lastMtime = null;
        }

        async function refreshImage() {
            try {
                const resp = await fetch('/api/current_image');
                const data = await resp.json();

                if (!data.image) {
                    hideImage();
                    return;
                }

                // Only reload if the image changed (by mtime)
                if (data.mtime === lastMtime) return;
                lastMtime = data.mtime;

                const src = '/images/' + data.image + '?v=' + data.mtime;
                showImage(src, data.image, data.size, data.mtime);
            } catch (e) {
                console.error('Refresh failed:', e);
            }
        }

        // Upload
        uploadArea.addEventListener('click', function (e) {
            if (e.target !== fileInput) fileInput.click();
        });

        uploadArea.addEventListener('dragover', function (e) {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', function () {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', function (e) {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            var file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        });

        fileInput.addEventListener('change', function () {
            var file = fileInput.files[0];
            if (file) {
                uploadFile(file);
                fileInput.value = '';
            }
        });

        async function uploadFile(file) {
            infoBar.innerHTML = 'Uploading...';
            var form = new FormData();
            form.append('file', file);
            try {
                var resp = await fetch('/api/upload_image', { method: 'POST', body: form });
                var data = await resp.json();
                if (data.ok) {
                    lastMtime = null; // force refresh
                    refreshImage();
                }
            } catch (e) {
                infoBar.innerHTML = '<span style=\"color:#f87171\">Upload failed</span>';
            }
        }

        // Initial load + poll
        refreshImage();
        setInterval(refreshImage, 3000);
    </script>
</body>
</html>
